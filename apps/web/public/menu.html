<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tony's Pizza Austin Menu</title>
    <style>
      body {
        margin: 0;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: #faf9f5;
        color: #181716;
      }
      .page {
        max-width: 780px;
        margin: 40px auto;
        background: #fff;
        border: 1px solid #e8e5dd;
        border-radius: 14px;
        padding: 32px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 30px;
      }
      p {
        margin: 0 0 18px;
        color: #55504a;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
      }
      th,
      td {
        padding: 10px 8px;
        border-bottom: 1px solid #ede9e0;
        text-align: left;
      }
      th {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6f685f;
      }
      .note {
        margin-top: 20px;
        font-size: 14px;
      }
      .muted {
        color: #6f685f;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>Tony's Pizza Austin</h1>
      <p>Simple demo menu used by the live voice agent.</p>
      <table>
        <thead>
          <tr>
            <th>Pizza</th>
            <th>Small</th>
            <th>Medium</th>
            <th>Large</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Cheese</td>
            <td>$12.99</td>
            <td>$14.99</td>
            <td>$16.99</td>
          </tr>
          <tr>
            <td>Pepperoni</td>
            <td>$13.99</td>
            <td>$15.99</td>
            <td>$17.99</td>
          </tr>
          <tr>
            <td>Veggie</td>
            <td>$13.99</td>
            <td>$15.99</td>
            <td>$17.99</td>
          </tr>
        </tbody>
      </table>
      <p class="muted">All pizzas contain dairy and gluten.</p>
    </main>
  </body>
</html>
